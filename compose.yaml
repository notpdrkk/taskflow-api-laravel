services:
  mysql:
    image: mysql:latest
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - mysql_data:/var/lib/mysql
  php:
    depends_on:
      - mysql
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
volumes:
  mysql_data: